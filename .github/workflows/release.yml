# Release pipeline for moha
#
# Triggers:
#   - Push of a tag matching v*  (e.g. v0.1.0)  → builds AND publishes a
#     GitHub Release with assets attached.
#   - workflow_dispatch (manual)                → builds only (no release).
#     Use this to validate the matrix on any branch before cutting a tag.
#
# Targets (all standalone — MOHA_STANDALONE=ON; libc stays dynamic on Linux
# per the README's "honest standalone" notes):
#   linux-x86_64    Ubuntu 22.04 + GCC 14 from the toolchain PPA
#   linux-arm64     Ubuntu 22.04 ARM runner + GCC 14
#   macos-x86_64    macOS 13 Intel runner
#   macos-arm64     macOS 14 Apple Silicon runner
#   windows-x86_64  Windows Server 2022 + MSVC 19.40+ via VS 2022
#
# Each platform produces a tarball / zip containing:
#   moha[.exe]       the binary
#   README.md        rendered as plain-text reference
#   LICENSE          (when present)
#
# A separate `release` job downloads every artifact, generates SHA256SUMS,
# and attaches everything to the GitHub Release.
#
# First-run caveats: cross-platform builds inevitably surface platform-
# specific quirks (vcpkg cache misses on Windows, Apple Clang version
# mismatches, etc.). Run via workflow_dispatch on a branch before tagging.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do not publish (forced true on workflow_dispatch)"
        required: false
        default: "true"

permissions:
  contents: write   # needed by the release job to create / update releases

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-22.04
            archive: tar.gz
          - target: linux-arm64
            os: ubuntu-22.04-arm
            archive: tar.gz
          - target: macos-x86_64
            os: macos-13
            archive: tar.gz
          - target: macos-arm64
            os: macos-14
            archive: tar.gz
          - target: windows-x86_64
            os: windows-2022
            archive: zip

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Linux toolchain: GCC 14 + system OpenSSL/nghttp2 + dpkg/rpm ───
      # `rpm` so cpack -G RPM works on the same Ubuntu runner without
      # spinning up a Fedora container; `file` is a CPack DEB dep used
      # for shlibs scanning.
      - name: Linux deps (GCC 14, OpenSSL, nghttp2, packagers)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 cmake ninja-build \
            libssl-dev libnghttp2-dev pkg-config \
            rpm file
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      # ── macOS toolchain: Apple Clang + Homebrew OpenSSL/nghttp2 ───────
      - name: macOS deps (OpenSSL, nghttp2)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew update
          brew install cmake ninja openssl@3 nghttp2 pkg-config
          # OpenSSL prefix differs by arch (Intel: /usr/local, ARM: /opt/homebrew)
          OPENSSL_ROOT="$(brew --prefix openssl@3)"
          echo "OPENSSL_ROOT_DIR=${OPENSSL_ROOT}"   >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_ROOT}/lib/pkgconfig:$(brew --prefix nghttp2)/lib/pkgconfig" >> "$GITHUB_ENV"

      # ── Windows toolchain: vcpkg-managed OpenSSL + nghttp2 + NSIS ─────
      # NSIS is what CPack -G NSIS shells out to. Choco install is the
      # path the GitHub-supported runners document.
      - name: Windows deps (vcpkg OpenSSL, nghttp2, NSIS)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install `
            openssl:x64-windows-static `
            nghttp2:x64-windows-static
          echo "VCPKG_TARGET_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
          choco install -y --no-progress nsis

      # ── Configure ────────────────────────────────────────────────────
      # MOHA_BUILD_PACKAGES=ON wires CPack into the build so the same
      # `build/` dir produces the platform installer in the package step.
      # MOHA_TARGET embeds the matrix target name into installer file
      # names so .deb / .rpm / .dmg / .exe coexist on the release page
      # under matching `moha-<ver>-<target>.<ext>` filenames.
      - name: Configure (Unix)
        if: "!startsWith(matrix.os, 'windows-')"
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMOHA_STANDALONE=ON \
            -DMOHA_BUILD_PACKAGES=ON \
            -DMOHA_TARGET=${{ matrix.target }}

      - name: Configure (Windows)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DMOHA_STANDALONE=ON `
            -DMOHA_BUILD_PACKAGES=ON `
            -DMOHA_TARGET=${{ matrix.target }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET"

      # ── Build ────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Smoke ────────────────────────────────────────────────────────
      - name: Smoke (binary exists + --version works)
        if: "!startsWith(matrix.os, 'windows-')"
        run: |
          ls -lh build/moha
          ./build/moha version || ./build/moha --version || true

      - name: Smoke (Windows)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          dir build\Release\moha.exe
          .\build\Release\moha.exe version

      # ── Package — portable archive (always) ──────────────────────────
      # Plain tarball / zip alongside the native installer. Some users
      # prefer the no-install drop-in (sysadmins, CI, sandboxed envs).
      - name: Package portable archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE="moha-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp build/moha "$STAGE/"
          cp README.md "$STAGE/"
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          tar czf "${STAGE}.tar.gz" "$STAGE"
          ls -lh "${STAGE}.tar.gz"

      - name: Package portable archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "moha-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item build/Release/moha.exe $stage/
          Copy-Item README.md $stage/
          if (Test-Path LICENSE) { Copy-Item LICENSE $stage/ }
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip"
          Get-ChildItem "$stage.zip"

      # ── Package — native installer (per platform) ────────────────────
      # CPack wraps the same install rules into the right format per
      # platform: .deb + .rpm on Linux, .dmg on macOS, .exe (NSIS) on
      # Windows. Output filenames are pinned via MOHA_TARGET (set at
      # configure time) so all installer formats land as
      # moha-<ver>-<target>.<ext> and coexist on the release page.
      - name: Build installer (Linux DEB + RPM)
        if: startsWith(matrix.os, 'ubuntu-')
        working-directory: build
        run: |
          cpack -G DEB -B "$PWD/cpack-out"
          cpack -G RPM -B "$PWD/cpack-out"
          ls -lh cpack-out/

      - name: Build installer (macOS DMG)
        if: startsWith(matrix.os, 'macos-')
        working-directory: build
        run: |
          cpack -G DragNDrop -B "$PWD/cpack-out"
          ls -lh cpack-out/

      - name: Build installer (Windows NSIS .exe)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        working-directory: build
        run: |
          cpack -G NSIS -B "$PWD/cpack-out" -C Release
          Get-ChildItem cpack-out\

      # ── Stage all artifacts in one place for upload ──────────────────
      # Both the portable archive and any native installer(s) — the
      # release job downloads everything and attaches it to the GH
      # Release. CPack lays out a `cpack-out/_CPack_Packages` work tree
      # next to the actual installer files; we copy only the latter.
      - name: Stage artifacts (Unix)
        if: "!startsWith(matrix.os, 'windows-')"
        run: |
          mkdir -p artifacts
          mv "moha-${{ matrix.target }}.tar.gz" artifacts/
          # Move every installer file CPack wrote, regardless of the
          # generator-specific subdirectory layout. _CPack_Packages
          # (CPack's scratch dir) is excluded.
          find build/cpack-out -maxdepth 2 -type f \
               \( -name 'moha-*.deb' -o -name 'moha-*.rpm' \
                  -o -name 'moha-*.dmg' \) \
               -exec mv {} artifacts/ \;
          ls -lh artifacts/

      - name: Stage artifacts (Windows)
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts | Out-Null
          Move-Item "moha-${{ matrix.target }}.zip" artifacts/
          Get-ChildItem -Recurse build\cpack-out -Filter 'moha-*.exe' | `
            Where-Object { $_.FullName -notmatch '_CPack_Packages' } | `
            ForEach-Object { Move-Item $_.FullName artifacts/ }
          Get-ChildItem artifacts\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moha-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  # ── Arch package ────────────────────────────────────────────────────
  # Reuses the linux-x86_64 tarball — the PKGBUILD is `moha-bin`, no
  # local compilation. Runs in archlinux:latest so makepkg + base-devel
  # are first-party, no need to bootstrap them on Ubuntu. Output is the
  # standard moha-bin-<ver>-1-x86_64.pkg.tar.zst, attached to the
  # release alongside .deb / .rpm.
  package-arch:
    name: package (arch x86_64)
    needs: build
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install Arch packaging deps (base-devel + git + cmake)
        run: |
          # cmake here only to run the configure_file step that
          # generates the PKGBUILD with PROJECT_VERSION baked in —
          # we don't actually compile anything in this job.
          pacman-key --init
          pacman -Sy --noconfirm
          pacman -S --noconfirm --needed base-devel git cmake

      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull linux-x86_64 build artifact
        uses: actions/download-artifact@v4
        with:
          name: moha-linux-x86_64
          path: artifacts-linux-x64

      - name: Generate PKGBUILD from PKGBUILD.in (PROJECT_VERSION baked in)
        # MOHA_BUILD_PACKAGES=ON triggers configure_file(PKGBUILD.in →
        # build/packaging/arch/PKGBUILD). Configure-only — no compile —
        # because we already have the binary tarball from the
        # linux-x86_64 build. Avoids duplicating the version string in
        # the PKGBUILD: the cmake project() line is the sole source.
        run: |
          cmake -B build -DMOHA_BUILD_PACKAGES=ON \
                         -DCMAKE_BUILD_TYPE=Release
          ls -lh build/packaging/arch/PKGBUILD
          grep -E '^(pkgname|pkgver|pkgrel)=' build/packaging/arch/PKGBUILD

      - name: Stage tarball + generated PKGBUILD where makepkg expects them
        # makepkg dedupes by filename: any `source=()` entry that already
        # exists in $startdir is reused instead of fetched. This lets the
        # CI build reference the just-uploaded artifact instead of trying
        # to download from a release that doesn't exist yet at this point.
        run: |
          mkdir -p arch-build
          cp build/packaging/arch/PKGBUILD arch-build/
          cp artifacts-linux-x64/moha-*-linux-x86_64.tar.gz arch-build/
          ls -lh arch-build/

      - name: Build .pkg.tar.zst (makepkg as nobody)
        # makepkg refuses to run as root; the Arch image's default user
        # is root inside CI, so we drop to `nobody` for the actual build
        # step and chown the working tree first.
        working-directory: arch-build
        run: |
          chown -R nobody:nobody .
          su nobody -s /bin/bash -c '
            export HOME=/tmp
            makepkg --skipchecksums --nodeps --noconfirm
            ls -lh *.pkg.tar.zst
          '

      - name: Stage Arch package as artifact
        run: |
          mkdir -p artifacts
          mv arch-build/*.pkg.tar.zst artifacts/
          ls -lh artifacts/

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: moha-linux-arch-x86_64
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish release
    needs: [build, package-arch]
    runs-on: ubuntu-latest
    # Only publish when invoked by a tag push, not on workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          ls -lh
          # Cover every artifact extension the matrix can produce —
          # archives + installers. Any new format added later just needs
          # an additional `-o -name` clause.
          find . -maxdepth 1 -type f \
               \( -name 'moha-*.tar.gz' -o -name 'moha-*.zip' \
                  -o -name 'moha-*.deb' -o -name 'moha-*.rpm' \
                  -o -name 'moha-*.dmg' -o -name 'moha-*.exe' \
                  -o -name 'moha-*.pkg.tar.zst' \) \
               -printf '%f\n' | sort | xargs -r sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/moha-*.tar.gz
            dist/moha-*.zip
            dist/moha-*.deb
            dist/moha-*.rpm
            dist/moha-*.dmg
            dist/moha-*.exe
            dist/moha-*.pkg.tar.zst
            dist/SHA256SUMS
